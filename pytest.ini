[pytest]
# Parametro para definir los archivos que se van a ejecutar (todos "test_")
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --html=reports/report.html --self-contained-html
log_cli = true
log_cli_level = INFO
markers = 
    smoke: pruebas criticas del sistema
    regression: pruebas de regresion
    api: pruebas de API
    ui: pruebas de UI
    bdd: pruebas BDD